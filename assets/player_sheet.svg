  <rect x="104" y="38" width="6" height="6" rx="1" fill="#2d2d2d"/>
  <rect x="114" y="34" width="6" height="6" rx="1" fill="#2d2d2d"/>
  <circle cx="108" cy="10" r="2" fill="#2d2d2d"/>
  <circle cx="116" cy="10" r="1.5" fill="#2d2d2d" opacity="0.5"/>
