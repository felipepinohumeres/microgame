<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plataformas 2D - Phaser</title>
  <style>
    :root {
      --bg1: #1f2a44;
      --bg2: #0e1628;
      --text: #f7fafc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, var(--bg1), var(--bg2));
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }

    #game-container {
      width: min(540px, 100vw);
      height: min(960px, 100vh);
      aspect-ratio: 9 / 16;
      border: 2px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
    }

    .editor-link {
      position: fixed;
      right: 10px;
      top: 10px;
      color: #eaf2ff;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      padding: 8px 10px;
      text-decoration: none;
      font-weight: bold;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #touch-controls {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      width: min(540px, 100vw);
      padding: 0 12px;
      display: none;
      justify-content: space-between;
      align-items: flex-end;
      pointer-events: none;
      z-index: 50;
    }

    .touch-group {
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    .touch-group-right {
      flex-direction: column;
      align-items: flex-end;
    }

    .touch-btn {
      width: 96px;
      height: 96px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.34);
      color: #eaf2ff;
      font-weight: 800;
      font-size: 30px;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      appearance: none;
      -webkit-appearance: none;
    }

    .touch-btn:active,
    .touch-btn.active {
      background: rgba(120, 196, 255, 0.4);
    }

    @media (hover: none) and (pointer: coarse) {
      #touch-controls {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <a class="editor-link" href="./level-editor.html">Editor de niveles</a>
  <a class="editor-link" style="top: 54px;" href="./player-editor.html">Editor del jugador</a>
  <a class="editor-link" style="top: 98px;" href="./tile-manager.html">Gestor de tiles</a>
  <div id="game-container"></div>
  <div id="touch-controls" aria-label="Controles tactiles">
    <div class="touch-group">
      <button class="touch-btn" data-touch="left" aria-label="Mover izquierda">◀</button>
      <button class="touch-btn" data-touch="right" aria-label="Mover derecha">▶</button>
    </div>
    <div class="touch-group touch-group-right">
      <button class="touch-btn" data-touch="attack" aria-label="Atacar">✦</button>
      <button class="touch-btn" data-touch="jump" aria-label="Saltar">⤒</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script src="./src/main.js"></script>
</body>
</html>
